<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body{
            font-family: 'Roboto', sans-serif;
           
            
        }
        .form-container {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.44);
            padding: 50px 50px 50px 20px;
            border-radius: 8px;
            width: 400px;
        }
       
       
  
        .form-control::placeholder {
            font-size: 12px;
            color: #494e52; 
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="row container align-items-center justify-content-center m-3">
        <div class="col-lg-6  bg-white align-items-center justify-content-center text-center ">
            <p class="display-2 m-0 text-primary fw-bold ">facebook</p><br>
            <p class="text-dark m-0 ">Facebook helps you connect and <br>share with peoples in your life</p>
        </div>
        
            <div class="col-lg-6  d-flex  flex-column align-items-center justify-content-center">
                <div class="form-container bg-white ">
                    <form>
                        <p class="h5 fw-bold ml-1 mb-3">Log in into facebook</p>
                        <div class="mb-3">
                          
                            <input type="tel" class="form-control" id="phone" placeholder="Enter phone number">
                        </div>
                        <div class="mb-3">
                            
                            <input type="password" class="form-control" id="password" placeholder="Enter password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Submit</button>

                        <a href=""><p class="text-primary mt-2 text-center" style="font-size: 12px;">Forgot password ?</p></a>
                        <hr>

                        <button type="submit" class="btn btn-success w-100 mt-3">Create a new account</button>
                    </form>
                    
                </div>
                <p class="mt-3">create a page for a celebrity , brand or buisnessmen</p>
            
        </div>
    </div>
</body>
</html>
