<!DOCTYPE html>
<html>
<head>
    <title>Carrom Board</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="10" align="center" width="400" height="400">
        <!-- Outer Border -->
        <tr>
            <td colspan="3" align="center" height="50">Top Border</td>
        </tr>
        <tr>
            <!-- Left Border -->
            <td align="center" width="50">Left Border</td>
            <!-- Inner Board -->
            <td align="center">
                <table border="1" cellspacing="5" cellpadding="10" width="100%" height="100%">
                    <tr>
                        <td align="center" width="25%">⚫</td>
                        <td></td>
                        <td align="center" width="25%">⚫</td>
                    </tr>
                    <tr>
                        <td></td>
                        <td align="center">◉</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td align="center">⚫</td>
                        <td></td>
                        <td align="center">⚫</td>
                    </tr>
                </table>
            </td>
            <!-- Right Border -->
            <td align="center" width="50">Right Border</td>
        </tr>
        <tr>
            <td colspan="3" align="center" height="50">Bottom Border</td>
        </tr>
    </table>
</body>
</html>
